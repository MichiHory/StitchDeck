<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Merger</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">

    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

        :root {
            --bg: #0e0f13;
            --surface: #16171d;
            --surface-2: #1e1f27;
            --border: #2a2b35;
            --border-hover: #3a3b48;
            --text: #e2e4ed;
            --text-dim: #7d7f8c;
            --accent: #6ee7a0;
            --accent-dim: #6ee7a020;
            --accent-glow: #6ee7a040;
            --danger: #f87171;
            --danger-dim: #f8717120;
            --radius: 12px;
            --radius-sm: 8px;
        }

        html { font-size: 15px; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            max-width: 1920px;
            margin: 0 auto;
        }
        .app-body {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            order: 2;
        }
        .sidebar-header {
            padding: .85rem 1rem;
            font-size: .8rem;
            font-weight: 700;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: .08em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .sidebar-header .add-btn {
            background: var(--accent);
            border: none;
            color: var(--bg);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: opacity .15s;
            font-weight: 700;
        }
        .sidebar-header .add-btn:hover {
            opacity: .85;
        }
        .project-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: .5rem;
        }
        .project-item {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .65rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
            transition: all .15s;
            border: 1px solid transparent;
            color: var(--text-dim);
            user-select: none;
        }
        .project-item:hover {
            background: var(--surface-2);
            color: var(--text);
        }
        .project-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            border-color: var(--accent);
        }
        .project-item .project-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .project-item .project-actions {
            display: none;
            gap: .25rem;
            flex-shrink: 0;
        }
        .project-item:hover .project-actions,
        .project-item.active .project-actions {
            display: flex;
        }
        .project-item .project-action-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            font-size: .75rem;
            line-height: 1;
            transition: all .15s;
        }
        .project-item .project-action-btn:hover {
            color: var(--text);
            background: var(--surface);
        }
        .project-item .project-action-btn.danger:hover {
            color: var(--danger);
            background: var(--danger-dim);
        }

        .main-content {
            flex: 1;
            min-width: 0;
            padding: 1.5rem 2rem 4rem;
            overflow-y: auto;
            order: 1;
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem 1rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }
        .top-bar .icon {
            width: 24px; height: 24px;
            background: var(--accent);
            border-radius: 6px;
            display: grid; place-items: center;
            color: var(--bg);
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .top-bar h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* ── Drop Zone ── */
        .dropzone-panel {
            width: 320px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            align-self: flex-start;
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            order: 0;
            overflow: hidden;
        }
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 0;
            padding: 2rem 1.25rem;
            text-align: center;
            transition: all .25s ease;
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface);
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: var(--accent);
            background: var(--accent-dim);
            box-shadow: 0 0 40px var(--accent-glow);
        }
        .dropzone.dragover .dropzone-icon {
            transform: scale(1.15);
        }
        .dropzone-icon {
            font-size: 2.5rem;
            margin-bottom: .75rem;
            transition: transform .2s ease;
            display: block;
        }
        .dropzone-title {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: .25rem;
        }
        .dropzone-sub {
            color: var(--text-dim);
            font-size: .85rem;
        }
        .path-capture {
            position: absolute;
            inset: 0;
            opacity: 0;
            resize: none;
            z-index: 1;
        }

        /* ── File List ── */
        .file-list {
            margin-top: 0;
            display: flex;
            flex-direction: column;
            gap: .4rem;
        }
        .file-item {
            position: relative;
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .4rem .75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: visible;
            font-size: .85rem;
            cursor: grab;
            transition: background .15s, border-color .15s;
            user-select: none;
        }
        .file-item:hover {
            border-color: var(--border-hover);
        }
        .file-item.dragging {
            opacity: .4;
        }
        .file-item.drag-over-item {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        /* ── Updated file: bubble burst + regrow ── */
        .file-item.grow-in {
            animation: file-grow-in .45s cubic-bezier(.34,1.56,.64,1) forwards;
            border-color: #22c55e;
        }
        .file-item.grow-in.settled {
            transition: border-color .4s ease;
            border-color: var(--border);
        }
        @keyframes file-grow-in {
            0% {
                transform: scale(.3);
                opacity: 0;
            }
            60% {
                opacity: 1;
            }
            80% {
                transform: scale(1.02);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        .burst-particle {
            position: fixed;
            border-radius: 3px;
            pointer-events: none;
            z-index: 1000;
            will-change: transform, opacity;
        }
        .file-item .grip {
            color: var(--text-dim);
            font-size: .7rem;
            letter-spacing: 2px;
            flex-shrink: 0;
        }
        .file-item .file-icon {
            flex-shrink: 0;
            width: 26px; height: 26px;
            background: var(--accent-dim);
            border-radius: 6px;
            display: grid; place-items: center;
            font-size: .7rem;
            color: var(--accent);
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
        }
        .file-item .file-info {
            flex: 1;
            min-width: 0;
        }
        .file-item .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item .file-path {
            color: var(--text-dim);
            font-size: .75rem;
            font-family: 'JetBrains Mono', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-item .file-meta {
            color: var(--text-dim);
            font-size: .75rem;
            flex-shrink: 0;
            text-align: right;
            white-space: nowrap;
            line-height: 1.4;
        }
        .file-item .remove-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all .15s;
            font-size: .9rem;
            flex-shrink: 0;
            line-height: 1;
        }
        .file-item .remove-btn:hover {
            color: var(--danger);
            background: var(--danger-dim);
        }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: .75rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .btn {
            font-family: 'Outfit', sans-serif;
            font-size: .875rem;
            font-weight: 600;
            padding: .65rem 1.4rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            transition: all .2s ease;
            display: inline-flex;
            align-items: center;
            gap: .5rem;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }
        .btn-primary:hover {
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            opacity: .35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-secondary {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--border-hover);
            background: var(--border);
        }
        .btn-secondary:disabled {
            opacity: .35;
            cursor: not-allowed;
        }
        .btn-danger {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid transparent;
        }
        .btn-danger:hover {
            border-color: var(--danger);
        }

        .actions-right {
            margin-left: auto;
            display: flex;
            gap: .5rem;
        }

        /* ── Output ── */
        .output-section {
            margin-top: 2rem;
        }
        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: .75rem;
        }
        .output-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }
        .output-meta {
            color: var(--text-dim);
            font-size: .8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .output-actions {
            display: flex;
            gap: .5rem;
            margin-bottom: .5rem;
        }
        .btn-sm {
            font-size: .78rem;
            padding: .45rem 1rem;
        }
        .output-box {
            width: 100%;
            min-height: 300px;
            max-height: 70vh;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            font-size: .8rem;
            line-height: 1.65;
            resize: vertical;
            overflow: auto;
            tab-size: 4;
            -moz-tab-size: 4;
            display: flex;
            scrollbar-width: thin;
            scrollbar-color: var(--border-hover) transparent;
        }
        .output-box::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        .output-box::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 5px;
        }
        .output-box::-webkit-scrollbar-thumb {
            background: var(--border-hover);
            border-radius: 5px;
            border: 2px solid var(--surface);
        }
        .output-box::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
        .output-box::-webkit-scrollbar-corner {
            background: transparent;
        }
        .output-box:focus-within {
            border-color: var(--accent);
        }
        .line-numbers {
            padding: 1.25rem .75rem 1.25rem .5rem;
            text-align: right;
            color: var(--text-dim);
            opacity: .5;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            flex-shrink: 0;
            white-space: pre;
            border-right: 1px solid var(--border);
            min-width: 3.5rem;
        }
        .output-content {
            padding: 1.25rem;
            white-space: pre;
            flex: 1;
            min-width: 0;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            top: 4.5rem;
            right: 1.5rem;
            transform: translateX(120%);
            background: #f59e0b;
            color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: .875rem;
            padding: .6rem 1.5rem;
            border-radius: 100px;
            pointer-events: none;
            opacity: 0;
            transition: all .35s cubic-bezier(.175,.885,.32,1.275);
            z-index: 999;
        }
        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        /* ── Truncation Warning ── */
        .truncation-warning {
            background: #f59e0b18;
            border: 1px solid #f59e0b44;
            border-radius: var(--radius-sm);
            padding: .6rem 1rem;
            margin-bottom: .75rem;
            color: #fbbf24;
            font-size: .82rem;
            display: none;
            align-items: center;
            gap: .5rem;
        }
        .truncation-warning.visible {
            display: flex;
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity .2s ease;
        }
        .modal-overlay.visible {
            opacity: 1;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            transform: scale(.95);
            transition: transform .2s ease;
        }
        .modal-overlay.visible .modal {
            transform: scale(1);
        }
        .modal-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .modal-input {
            width: 100%;
            padding: .55rem .75rem;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: .9rem;
            outline: none;
            transition: border-color .15s;
        }
        .modal-input:focus {
            border-color: var(--accent);
        }
        .modal-body {
            color: var(--text-dim);
            font-size: .9rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: .5rem;
            margin-top: 1.25rem;
        }

        /* ── Toggle Options ── */
        .merge-options {
            display: flex;
            gap: 1.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .toggle-option {
            display: flex;
            align-items: center;
            gap: .5rem;
            font-size: .82rem;
            color: var(--text-dim);
            cursor: pointer;
            user-select: none;
        }
        .toggle-option:hover {
            color: var(--text);
        }
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            flex-shrink: 0;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }
        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: all .2s;
            cursor: pointer;
        }
        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            left: 2px;
            top: 2px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all .2s;
        }
        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(16px);
            background: var(--accent);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            color: var(--text-dim);
            padding: 2rem;
            font-size: .9rem;
        }


        @media (max-width: 768px) {
            .app-body { flex-direction: column; }
            .dropzone-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid var(--border);
                order: -2;
                padding: .5rem;
            }
            .sidebar {
                width: 100%;
                border-left: none;
                border-bottom: 1px solid var(--border);
                max-height: 200px;
                order: -1;
            }
            .main-content { padding: 1.5rem 1rem 3rem; }
            .actions { flex-direction: column; }
            .actions-right { margin-left: 0; }
            .output-actions { flex-wrap: wrap; }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <span class="icon">⛙</span>
        <h1>File Merger</h1>
    </div>
    <div class="app-body">
    <!-- Drop Zone Panel -->
    <div class="dropzone-panel">
        <div class="dropzone" id="dropzone">
            <span class="dropzone-icon">📂</span>
            <div class="dropzone-title">Přetáhněte soubory sem</div>
            <div class="dropzone-sub">soubory budou přidány do seznamu níže</div>
            <textarea id="pathCapture" class="path-capture"></textarea>
        </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span>Projekty</span>
            <button class="add-btn" id="newProjectBtn" title="Nový projekt">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

    <!-- File List -->
    <div class="file-list" id="fileList"></div>

    <!-- Actions -->
    <div class="actions" id="mainActions" style="display:none">
        <button class="btn btn-primary" id="mergeBtn">⛙ Sloučit soubory</button>
        <div class="actions-right">
            <button class="btn btn-danger" id="clearBtn">Vymazat vše</button>
        </div>
    </div>

    <!-- Merge Options -->
    <div class="merge-options" id="mergeOptions" style="display:none">
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="togglePaths" checked>
                <span class="toggle-slider"></span>
            </span>
            Vkládat cesty k souborům
        </label>
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="toggleTrimEmpty">
                <span class="toggle-slider"></span>
            </span>
            Oříznout prázdné řádky na začátku/konci
        </label>
    </div>

    <!-- Output -->
    <div class="output-section" id="outputSection" style="display:none">
        <div class="output-header">
            <h2>Sloučený výstup</h2>
            <span class="output-meta" id="outputMeta"></span>
        </div>
        <div class="truncation-warning" id="truncationWarning">
            ⚠️ <span>Zobrazení je omezeno na 20 000 řádků. Stáhněte soubor pro kompletní obsah.</span>
        </div>
        <div class="output-actions">
            <button class="btn btn-secondary btn-sm" id="copyBtn">📋 Kopírovat</button>
            <button class="btn btn-secondary btn-sm" id="downloadBtn">⬇ Stáhnout</button>
        </div>
        <div class="output-box" id="outputBox"><div class="line-numbers" id="lineNumbers"></div><div class="output-content" id="outputContent"></div></div>
    </div>
    </div><!-- /main-content -->
    </div><!-- /app-body -->
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/php.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/blade.min.js"></script>

<script>
    const MAX_DISPLAY_LINES = 20000;
    const DB_NAME = 'fmerge';
    const DB_VERSION = 1;
    const STORE_NAME = 'projects';

    const dropzone = document.getElementById('dropzone');
    const fileListEl = document.getElementById('fileList');
    const mainActions = document.getElementById('mainActions');
    const mergeBtn = document.getElementById('mergeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const outputSection = document.getElementById('outputSection');
    const lineNumbers = document.getElementById('lineNumbers');
    const outputContent = document.getElementById('outputContent');
    const outputMeta = document.getElementById('outputMeta');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const truncationWarning = document.getElementById('truncationWarning');
    const toastEl = document.getElementById('toast');
    const projectList = document.getElementById('projectList');
    const newProjectBtn = document.getElementById('newProjectBtn');
    const mergeOptions = document.getElementById('mergeOptions');
    const togglePaths = document.getElementById('togglePaths');
    const toggleTrimEmpty = document.getElementById('toggleTrimEmpty');

    // ── Modal ──
    function showModal({ title, body, inputValue, placeholder, confirmText = 'OK', confirmClass = 'btn-primary', showInput = false }) {
        return new Promise(resolve => {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
                <div class="modal">
                    <div class="modal-title">${escapeHtml(title)}</div>
                    ${body ? `<div class="modal-body">${body}</div>` : ''}
                    ${showInput ? `<input class="modal-input" type="text" value="${escapeHtml(inputValue || '')}" placeholder="${escapeHtml(placeholder || '')}">` : ''}
                    <div class="modal-buttons">
                        <button class="btn btn-secondary modal-cancel">Zrušit</button>
                        <button class="btn ${confirmClass} modal-confirm">${escapeHtml(confirmText)}</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
            requestAnimationFrame(() => overlay.classList.add('visible'));

            const input = overlay.querySelector('.modal-input');
            const confirmBtn = overlay.querySelector('.modal-confirm');
            const cancelBtn = overlay.querySelector('.modal-cancel');

            if (input) {
                input.focus();
                input.select();
            } else {
                confirmBtn.focus();
            }

            function close(value) {
                overlay.classList.remove('visible');
                overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
                resolve(value);
            }

            confirmBtn.addEventListener('click', () => {
                close(showInput ? (input.value.trim() || null) : true);
            });
            cancelBtn.addEventListener('click', () => close(null));
            overlay.addEventListener('click', e => {
                if (e.target === overlay) close(null);
            });
            if (input) {
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') confirmBtn.click();
                    if (e.key === 'Escape') close(null);
                });
            }
            overlay.addEventListener('keydown', e => {
                if (e.key === 'Escape') close(null);
            });
        });
    }

    let files = []; // { name, path, content, size }
    let fullMergedContent = '';
    let dragSrcIndex = null;
    let renderGeneration = 0;
    let currentProjectId = null;
    let saveTimeout = null;
    const pathCapture = document.getElementById('pathCapture');

    // ── IndexedDB ──
    function openDB() {
        return new Promise((resolve, reject) => {
            const req = indexedDB.open(DB_NAME, DB_VERSION);
            req.onupgradeneeded = () => {
                const db = req.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function getAllProjects() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req = store.getAll();
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function getProject(id) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const req = store.get(id);
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
    }

    async function saveProject(project) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(project);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    async function deleteProject(id) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.delete(id);
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });
    }

    // ── Project Management ──
    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    async function renderProjectList() {
        const projects = await getAllProjects();
        projectList.innerHTML = '';
        projects.sort((a, b) => a.name.localeCompare(b.name, 'cs'));
        for (const p of projects) {
            const el = document.createElement('div');
            el.className = 'project-item' + (p.id === currentProjectId ? ' active' : '');
            el.innerHTML = `
                <span class="project-name">${escapeHtml(p.name)}</span>
                <span class="project-actions">
                    <button class="project-action-btn rename-btn" title="Přejmenovat">✎</button>
                    <button class="project-action-btn danger delete-btn" title="Smazat">✕</button>
                </span>
            `;
            el.addEventListener('click', async (e) => {
                if (e.target.closest('.project-action-btn')) return;
                if (p.id === currentProjectId) return;
                await persistCurrentProject();
                await switchToProject(p.id);
                await renderProjectList();
            });
            el.querySelector('.rename-btn').addEventListener('click', async () => {
                const name = await showModal({
                    title: 'Přejmenovat projekt',
                    showInput: true,
                    inputValue: p.name,
                    confirmText: 'Přejmenovat',
                });
                if (!name || name === p.name) return;
                const project = await getProject(p.id);
                project.name = name;
                await saveProject(project);
                await renderProjectList();
                toast('Projekt přejmenován: ' + name);
            });
            el.querySelector('.delete-btn').addEventListener('click', async () => {
                if (projects.length <= 1) {
                    toast('Nelze smazat poslední projekt');
                    return;
                }
                const confirmed = await showModal({
                    title: 'Smazat projekt',
                    body: `Opravdu chcete smazat projekt <strong>${escapeHtml(p.name)}</strong>?`,
                    confirmText: 'Smazat',
                    confirmClass: 'btn-danger',
                });
                if (!confirmed) return;
                await deleteProject(p.id);
                if (p.id === currentProjectId) {
                    const remaining = await getAllProjects();
                    currentProjectId = remaining[0].id;
                    localStorage.setItem('fmerge_activeProject', currentProjectId);
                    await switchToProject(currentProjectId);
                }
                await renderProjectList();
                toast('Projekt smazán');
            });
            projectList.appendChild(el);
        }
    }

    async function switchToProject(id) {
        const project = await getProject(id);
        if (!project) return;
        currentProjectId = id;
        localStorage.setItem('fmerge_activeProject', id);
        files = (project.files || []).map(f => ({
            name: f.name,
            path: f.path,
            content: f.content,
            size: f.size
        }));
        fullMergedContent = '';
        outputContent.innerHTML = '';
        lineNumbers.textContent = '';
        outputSection.style.display = 'none';
        truncationWarning.classList.remove('visible');
        renderFileList();
    }

    function scheduleSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => persistCurrentProject(), 300);
    }

    async function persistCurrentProject() {
        if (!currentProjectId) return;
        // Read content for any files that haven't been read yet
        for (const entry of files) {
            if (entry.content === null && entry._file) {
                entry.content = await readFile(entry._file);
                entry.size = entry._file.size;
            }
        }
        const project = await getProject(currentProjectId);
        if (!project) return;
        project.files = files.map(f => ({
            name: f.name,
            path: f.path,
            content: f.content,
            size: f.size
        }));
        await saveProject(project);
    }

    newProjectBtn.addEventListener('click', async () => {
        const name = await showModal({
            title: 'Nový projekt',
            showInput: true,
            placeholder: 'Název projektu',
            confirmText: 'Vytvořit',
        });
        if (!name) return;
        const id = generateId();
        await saveProject({ id, name, files: [] });
        currentProjectId = id;
        localStorage.setItem('fmerge_activeProject', id);
        files = [];
        fullMergedContent = '';
        outputContent.innerHTML = '';
        lineNumbers.textContent = '';
        outputSection.style.display = 'none';
        truncationWarning.classList.remove('visible');
        renderFileList();
        await renderProjectList();
        toast('Projekt vytvořen: ' + name.trim());
    });

    // ── Init ──
    (async () => {
        const projects = await getAllProjects();
        if (projects.length === 0) {
            const id = generateId();
            await saveProject({ id, name: 'Výchozí projekt', files: [] });
            currentProjectId = id;
            localStorage.setItem('fmerge_activeProject', id);
        } else {
            const savedId = localStorage.getItem('fmerge_activeProject');
            const exists = projects.find(p => p.id === savedId);
            currentProjectId = exists ? savedId : projects[0].id;
            localStorage.setItem('fmerge_activeProject', currentProjectId);
        }
        await renderProjectList();
        await switchToProject(currentProjectId);
    })();

    // ── Drag & Drop Zone ──
    dropzone.addEventListener('dragover', e => {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', e => {
        if (!dropzone.contains(e.relatedTarget)) {
            dropzone.classList.remove('dragover');
        }
    });
    dropzone.addEventListener('drop', e => {
        e.preventDefault();
        dropzone.classList.remove('dragover');

        const dt = e.dataTransfer;
        const droppedFiles = dt.files;

        const textData = dt.getData('text') || dt.getData('text/uri-list') || '';
        const pathLines = textData.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

        const textareaLines = pathCapture.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        pathCapture.value = '';

        const capturedPaths = pathLines.length >= droppedFiles.length ? pathLines : textareaLines;

        handleFilesWithPaths(droppedFiles, capturedPaths);
    });

    pathCapture.addEventListener('drop', e => {
        const textData = e.dataTransfer.getData('text') || e.dataTransfer.getData('text/uri-list') || '';
        if (textData) {
            pathCapture.value = textData;
        }
    });

    async function handleFilesWithPaths(fileList, capturedPaths) {
        const updatedIndices = [];
        for (let i = 0; i < fileList.length; i++) {
            const f = fileList[i];
            let path = f.webkitRelativePath || f.name;

            if (capturedPaths.length > 0) {
                if (capturedPaths.length === fileList.length) {
                    const candidate = cleanPath(capturedPaths[i]);
                    if (candidate && candidate.toLowerCase().endsWith(f.name.toLowerCase())) {
                        path = candidate;
                    }
                } else {
                    const match = capturedPaths.find(p =>
                        cleanPath(p).toLowerCase().endsWith(f.name.toLowerCase())
                    );
                    if (match) {
                        path = cleanPath(match);
                        capturedPaths = capturedPaths.filter(p => p !== match);
                    }
                }
            }

            const content = await readFile(f);
            const existingIndex = files.findIndex(entry => entry.path === path);
            if (existingIndex !== -1) {
                files[existingIndex] = { name: f.name, path, content, size: f.size };
                updatedIndices.push(existingIndex);
                toast('Aktualizován: ' + f.name);
            } else {
                files.push({ name: f.name, path, content, size: f.size });
            }
        }
        // Capture positions of updated items BEFORE re-render
        const burstRects = {};
        updatedIndices.forEach(idx => {
            const oldEl = fileListEl.querySelector(`[data-index="${idx}"]`);
            if (oldEl) burstRects[idx] = oldEl.getBoundingClientRect();
        });

        renderFileList();

        updatedIndices.forEach(idx => {
            const el = fileListEl.querySelector(`[data-index="${idx}"]`);
            if (!el) return;
            const rect = burstRects[idx] || el.getBoundingClientRect();
            burstAndRegrow(el, rect);
        });
        scheduleSave();
    }

    function cleanPath(rawPath) {
        if (!rawPath) return '';
        let p = rawPath.replace(/^file:\/\/\/?/, '');
        try { p = decodeURIComponent(p); } catch(e) {}
        return p.trim();
    }

    // ── Toggle persistence ──
    togglePaths.checked = localStorage.getItem('fmerge_togglePaths') !== 'false';
    toggleTrimEmpty.checked = localStorage.getItem('fmerge_toggleTrimEmpty') === 'true';
    togglePaths.addEventListener('change', () => localStorage.setItem('fmerge_togglePaths', togglePaths.checked));
    toggleTrimEmpty.addEventListener('change', () => localStorage.setItem('fmerge_toggleTrimEmpty', toggleTrimEmpty.checked));

    function renderFileList() {
        fileListEl.innerHTML = '';
        mainActions.style.display = files.length ? 'flex' : 'none';
        mergeOptions.style.display = files.length ? 'flex' : 'none';
        const currentGen = ++renderGeneration;

        files.forEach((entry, i) => {
            const el = document.createElement('div');
            el.className = 'file-item';
            el.draggable = true;
            el.dataset.index = i;

            const extRaw = entry.path.split('.').pop();
            const ext = extRaw.toUpperCase().slice(0, 4);
            const extColor = getExtColor(extRaw);
            const size = formatSize(entry.size);

            const lineCount = entry.content ? entry.content.split('\n').length : 0;
            const linesText = lineCount ? lineCount.toLocaleString('cs') + ' lines' : '…';

            el.innerHTML = `
      <span class="grip">⠿</span>
      <span class="file-icon" style="background:${extColor}22;color:${extColor};border:1px solid ${extColor}44">${ext}</span>
      <div class="file-info">
        <div class="file-name">${escapeHtml(entry.name)}</div>
        <div class="file-path" title="${escapeHtml(entry.path)}">${escapeHtml(entry.path)}</div>
      </div>
      <span class="file-meta">${size}<br>${linesText}</span>
      <button class="remove-btn" title="Odebrat">✕</button>
    `;

            el.querySelector('.remove-btn').addEventListener('click', () => {
                files.splice(i, 1);
                renderFileList();
                scheduleSave();
            });

            // ── Reorder drag ──
            el.addEventListener('dragstart', e => {
                dragSrcIndex = i;
                el.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            });
            el.addEventListener('dragend', () => {
                el.classList.remove('dragging');
                dragSrcIndex = null;
                document.querySelectorAll('.drag-over-item').forEach(x => x.classList.remove('drag-over-item'));
            });
            el.addEventListener('dragover', e => {
                e.preventDefault();
                if (dragSrcIndex !== null && dragSrcIndex !== i) {
                    el.classList.add('drag-over-item');
                }
            });
            el.addEventListener('dragleave', () => {
                el.classList.remove('drag-over-item');
            });
            el.addEventListener('drop', e => {
                e.preventDefault();
                e.stopPropagation();
                el.classList.remove('drag-over-item');
                if (dragSrcIndex !== null && dragSrcIndex !== i) {
                    const moved = files.splice(dragSrcIndex, 1)[0];
                    files.splice(i, 0, moved);
                    renderFileList();
                    scheduleSave();
                }
            });

            fileListEl.appendChild(el);
        });
    }

    // ── Barvy pro přípony souborů ──
    function getExtColor(ext) {
        ext = ext.toLowerCase();
        const map = {
            html: '#e44d26', htm: '#e44d26',
            xml: '#f16529', svg: '#f7a41d',
            js: '#f7df1e', mjs: '#f7df1e',
            ts: '#3178c6', tsx: '#3178c6',
            jsx: '#61dafb',
            vue: '#42b883', svelte: '#ff3e00',
            php: '#777bb4',
            json: '#a8b9cc',
            yaml: '#cb171e', yml: '#cb171e', neon: '#e25822',
            latte: '#6cc644',
            blade: '#f05340',
            css: '#264de4', scss: '#cd6799', less: '#1d365d',
            py: '#3776ab',
            rb: '#cc342d',
            java: '#f89820',
            go: '#00add8',
            rs: '#dea584',
            c: '#555555', cpp: '#f34b7d', h: '#555555',
            sh: '#89e051', bash: '#89e051',
            sql: '#e38c00',
            md: '#083fa1', txt: '#7d7f8c',
        };
        return map[ext] || '#6ee7a0';
    }

    // ── Mapování extenzí pro syntax highlighting ──
    function getLanguage(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if (['js', 'jsx'].includes(ext)) return 'javascript';
        if (['ts', 'tsx'].includes(ext)) return 'typescript';
        if (['html', 'xml', 'latte', 'vue', 'svelte'].includes(ext)) return 'xml';
        if (['blade'].includes(ext)) return 'blade';
        if (['php'].includes(ext)) return 'php';
        if (['json'].includes(ext)) return 'json';
        if (['yaml', 'yml', 'neon'].includes(ext)) return 'yaml';
        if (['css'].includes(ext)) return 'css';
        if (['scss'].includes(ext)) return 'scss';
        if (['less'].includes(ext)) return 'less';
        return 'plaintext';
    }

    // ── Merge ──
    mergeBtn.addEventListener('click', async () => {
        if (!files.length) return;

        mergeBtn.disabled = true;
        mergeBtn.textContent = '⏳ Načítání…';

        try {
            let plainLinesArray = [];
            let htmlLinesArray = [];

            const includePaths = togglePaths.checked;
            const trimEmpty = toggleTrimEmpty.checked;

            for (let i = 0; i < files.length; i++) {
                const entry = files[i];
                let contentStr = entry.content || '';
                const lang = getLanguage(entry.path);

                if (trimEmpty) {
                    contentStr = contentStr.replace(/^\n+/, '').replace(/\n+$/, '');
                }

                // Plain-text logika (pro schránku a soubor)
                if (includePaths) {
                    plainLinesArray.push(`${entry.path}:`);
                }
                const plainContentLines = contentStr.split('\n');
                plainLinesArray.push(...plainContentLines);

                // HTML logika (pro viditelný výstup se syntax highlightingem)
                if (includePaths) {
                    const pathLineHtml = `<span style="color: #39ff14; font-weight: 700;">${escapeHtml(entry.path)}:</span>`;
                    htmlLinesArray.push(pathLineHtml);
                }

                let highlightedContent = '';
                if (lang !== 'plaintext' && window.hljs && hljs.getLanguage(lang)) {
                    highlightedContent = hljs.highlight(contentStr, { language: lang, ignoreIllegals: true }).value;
                } else {
                    highlightedContent = escapeHtml(contentStr);
                }

                const highlightedContentLines = highlightedContent.split('\n');
                htmlLinesArray.push(...highlightedContentLines);

                if (i < files.length - 1) {
                    plainLinesArray.push('');
                    htmlLinesArray.push('');
                }
            }

            fullMergedContent = plainLinesArray.join('\n');
            const totalLines = plainLinesArray.length;
            const totalFiles = files.length;
            const totalSize = formatSize(new Blob([fullMergedContent]).size);

            let displayLinesHtml;

            if (totalLines > MAX_DISPLAY_LINES) {
                displayLinesHtml = htmlLinesArray.slice(0, MAX_DISPLAY_LINES);
                truncationWarning.classList.add('visible');
            } else {
                displayLinesHtml = htmlLinesArray;
                truncationWarning.classList.remove('visible');
            }

            outputContent.innerHTML = displayLinesHtml.join('\n');
            lineNumbers.textContent = displayLinesHtml.map((_, i) => i + 1).join('\n');

            outputMeta.textContent = `${totalFiles} souborů · ${totalLines.toLocaleString('cs')} řádků · ${totalSize}`;
            outputSection.style.display = 'block';
            outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (err) {
            toast('Chyba při čtení souborů: ' + err.message);
        }

        mergeBtn.disabled = false;
        mergeBtn.textContent = '⛙ Sloučit soubory';
    });

    // ── Copy ──
    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(fullMergedContent);
            toast('Zkopírováno do schránky ✓');
        } catch {
            const ta = document.createElement('textarea');
            ta.value = fullMergedContent;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            toast('Zkopírováno ✓');
        }
    });

    // ── Download ──
    downloadBtn.addEventListener('click', () => {
        const blob = new Blob([fullMergedContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'merged-files.txt';
        a.click();
        URL.revokeObjectURL(url);
        toast('Soubor stažen ✓');
    });

    // ── Clear ──
    clearBtn.addEventListener('click', async () => {
        const confirmed = await showModal({
            title: 'Vymazat vše',
            body: 'Opravdu chcete vymazat všechny soubory a výstup?',
            confirmText: 'Vymazat',
            confirmClass: 'btn-danger',
        });
        if (!confirmed) return;
        files = [];
        fullMergedContent = '';
        outputContent.innerHTML = '';
        lineNumbers.textContent = '';
        outputSection.style.display = 'none';
        truncationWarning.classList.remove('visible');
        renderFileList();
        scheduleSave();
        toast('Vše vymazáno');
    });

    // ── Helpers ──
    function readFile(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(reader.error);
            reader.readAsText(file);
        });
    }

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function burstAndRegrow(el, rect) {
        const PARTICLE_COUNT = 18;
        const colors = ['#22c55e','#4ade80','#16a34a','#86efac','#bbf7d0','#a3e635'];
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        // Spawn particles at the old box position
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const p = document.createElement('div');
            p.className = 'burst-particle';
            const w = 4 + Math.random() * 8;
            const h = 3 + Math.random() * 6;
            p.style.width = w + 'px';
            p.style.height = h + 'px';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];

            // Start at random position along box edges
            let sx, sy;
            const edge = Math.floor(Math.random() * 4);
            if (edge === 0)      { sx = rect.left + Math.random() * rect.width; sy = rect.top; }
            else if (edge === 1) { sx = rect.left + Math.random() * rect.width; sy = rect.bottom; }
            else if (edge === 2) { sx = rect.left; sy = rect.top + Math.random() * rect.height; }
            else                 { sx = rect.right; sy = rect.top + Math.random() * rect.height; }

            p.style.left = sx + 'px';
            p.style.top = sy + 'px';

            // Fly outward from center
            const angle = Math.atan2(sy - cy, sx - cx) + (Math.random() - .5) * .8;
            const dist = 40 + Math.random() * 80;
            const dx = Math.cos(angle) * dist;
            const dy = Math.sin(angle) * dist + (Math.random() * 20 - 5); // slight gravity
            const rot = (Math.random() - .5) * 360;
            const dur = 350 + Math.random() * 250;

            document.body.appendChild(p);

            p.animate([
                { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
                { transform: `translate(${dx}px,${dy}px) rotate(${rot}deg) scale(.2)`, opacity: 0 }
            ], { duration: dur, easing: 'cubic-bezier(.25,.46,.45,.94)', fill: 'forwards' })
            .onfinish = () => p.remove();
        }

        // Grow in the new element like an inflating bubble
        el.classList.add('grow-in');
        el.addEventListener('animationend', () => {
            el.classList.add('settled');
            setTimeout(() => {
                el.classList.remove('grow-in', 'settled');
            }, 500);
        }, { once: true });
    }

    function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.add('show');
        clearTimeout(toastEl._timer);
        toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 3500);
    }
</script>

</body>
</html>
