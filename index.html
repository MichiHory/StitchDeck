<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMerge — File Merger</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2322c55e' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M4 4l8 8M20 4l-8 8M12 12v8'/><polyline points='9 17 12 20 15 17'/></svg>">
</head>
<body>

<div class="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <span class="logo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4l8 8M20 4l-8 8M12 12v8"/>
                    <polyline points="9 17 12 20 15 17"/>
                </svg>
            </span>
            <h1>FMerge</h1>
        </div>
        <div class="top-bar-right">
            <div class="lang-switcher" id="langSwitcher"></div>
            <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </div>
    <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span data-i18n="projects">Projects</span>
            <button class="add-btn" id="newProjectBtn" data-i18n-title="newProject" title="New project">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            </button>
        </div>
        <div class="project-list" id="projectList"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

    <!-- File List (always visible — toolbar shows even with no files) -->
    <div class="file-list-wrapper" id="fileListWrapper">
        <div class="file-list-toolbar" id="fileListToolbar">
            <div class="view-toggle" id="viewToggle">
                <button class="view-toggle-btn active" data-view="list" id="viewListBtn" title="List">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    <span data-i18n="viewList">List</span>
                </button>
                <button class="view-toggle-btn" data-view="tiles" id="viewTilesBtn" title="Tiles">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span data-i18n="viewTiles">Tiles</span>
                </button>
            </div>
            <button class="btn-add-text" id="addCustomTextBtn" data-i18n-title="addCustomText" title="Add text">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                <span data-i18n="addCustomText">Add text</span>
            </button>
            <button class="btn-github" id="githubBtn" title="GitHub">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                <span>GitHub</span>
            </button>
        </div>
        <!-- GitHub status bar -->
        <div class="gh-status-bar" id="ghStatusBar" style="display:none">
            <div class="gh-status-info">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
                <span class="gh-status-repo" id="ghStatusRepo"></span>
                <span class="gh-status-branch" id="ghStatusBranch"></span>
            </div>
            <div class="gh-status-actions">
                <button class="btn btn-secondary btn-sm gh-sync-btn" id="ghSyncBtn" title="Sync">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                    <span data-i18n="ghSyncBtn">Sync</span>
                </button>
                <button class="btn btn-secondary btn-sm gh-settings-btn" id="ghSettingsBtn" title="Settings">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                </button>
                <button class="btn btn-secondary btn-sm gh-disconnect-btn" id="ghDisconnectBtn" title="Disconnect">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
        <div class="file-list" id="fileList"></div>
    </div>

    <!-- Drop Zone (visible when no files) -->
    <div class="dropzone" id="dropzone">
        <div class="dropzone-visual">
            <span class="dropzone-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
            </span>
            <div class="dropzone-title" data-i18n="dropFilesHere">Drop files here</div>
            <div class="dropzone-sub" data-i18n="filesWillBeAdded">files will be added to the project</div>
        </div>
        <textarea id="pathCapture" class="path-capture"></textarea>
    </div>

    <!-- Drop Overlay (visible when dragging files over main content) -->
    <div class="main-content-drop-overlay" id="mainContentDropOverlay">
        <span class="dropzone-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
        </span>
        <div class="dropzone-title" data-i18n="dropFilesHere">Drop files here</div>
    </div>

    <!-- Actions -->
    <div class="actions" id="mainActions" style="display:none">
        <button class="btn btn-primary" id="mergeBtn">
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l8 8M20 4l-8 8M12 12v8"/><polyline points="9 17 12 20 15 17"/></svg>
            <span data-i18n="mergeFiles">Merge files</span>
        </button>
        <button class="btn btn-primary" id="downloadPdfBtn" style="display:none">
            <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span data-i18n="downloadPdf">Download PDF</span>
        </button>
        <div class="actions-right">
            <button class="btn btn-danger" id="clearBtn" data-i18n="clearAll">Clear all</button>
        </div>
    </div>

    <!-- Merge Options -->
    <div class="merge-options" id="mergeOptions" style="display:none">
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="togglePaths" checked>
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="includeFilePaths">Include file paths</span>
        </label>
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="toggleTrimEmpty">
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="trimEmptyLines">Trim empty lines at start/end</span>
        </label>
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="toggleFileMap" checked>
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="includeFileMap">LLM-optimized format (file map + XML tags)</span>
        </label>
        <label class="toggle-option" id="togglePdfToTextLabel" style="display:none">
            <span class="toggle-switch">
                <input type="checkbox" id="togglePdfToText" checked>
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="convertPdfToText">Convert PDF documents to text</span>
        </label>
    </div>

    <!-- Output -->
    <div class="output-section" id="outputSection" style="display:none">
        <div class="output-header">
            <h2 data-i18n="mergedOutput">Merged output</h2>
            <span class="output-meta" id="outputMeta"></span>
        </div>
        <div class="truncation-warning" id="truncationWarning">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span data-i18n="truncationWarning">Display is limited to 20,000 lines. Download the file for full content.</span>
        </div>
        <div class="output-actions">
            <button class="btn btn-secondary btn-sm" id="copyBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span data-i18n="copy">Copy</span>
            </button>
            <button class="btn btn-secondary btn-sm" id="downloadBtn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span data-i18n="download">Download</span>
            </button>
        </div>
        <div class="output-box" id="outputBox"><div class="line-numbers" id="lineNumbers"></div><div class="output-content" id="outputContent"></div></div>
    </div>
    </div><!-- /main-content -->
    </div><!-- /app-body -->
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
