<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Merger</title>
</head>
<body>

<div class="app">
    <!-- Top Bar -->
    <div class="top-bar">
        <span class="icon">⛙</span>
        <h1>File Merger</h1>
        <div class="lang-switcher" id="langSwitcher"></div>
    </div>
    <div class="app-body">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <span data-i18n="projects">Projects</span>
            <button class="add-btn" id="newProjectBtn" data-i18n-title="newProject" title="New project">+</button>
        </div>
        <div class="project-list" id="projectList"></div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">

    <!-- Drop Zone (visible when no files) -->
    <div class="dropzone" id="dropzone">
        <span class="dropzone-icon">📂</span>
        <div class="dropzone-title" data-i18n="dropFilesHere">Drop files here</div>
        <div class="dropzone-sub" data-i18n="filesWillBeAdded">files will be added to the project</div>
        <textarea id="pathCapture" class="path-capture"></textarea>
    </div>

    <!-- Drop Overlay (visible when dragging files over main content) -->
    <div class="main-content-drop-overlay" id="mainContentDropOverlay">
        <span class="dropzone-icon">📂</span>
        <div class="dropzone-title" data-i18n="dropFilesHere">Drop files here</div>
    </div>

    <!-- File List -->
    <div class="file-list-wrapper" id="fileListWrapper">
        <div class="file-list" id="fileList"></div>
    </div>

    <!-- Actions -->
    <div class="actions" id="mainActions" style="display:none">
        <button class="btn btn-primary" id="mergeBtn" data-i18n="mergeFiles">⛙ Merge files</button>
        <button class="btn btn-primary" id="downloadPdfBtn" style="display:none" data-i18n="downloadPdf">⬇ Download PDF</button>
        <div class="actions-right">
            <button class="btn btn-danger" id="clearBtn" data-i18n="clearAll">Clear all</button>
        </div>
    </div>

    <!-- Merge Options -->
    <div class="merge-options" id="mergeOptions" style="display:none">
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="togglePaths" checked>
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="includeFilePaths">Include file paths</span>
        </label>
        <label class="toggle-option">
            <span class="toggle-switch">
                <input type="checkbox" id="toggleTrimEmpty">
                <span class="toggle-slider"></span>
            </span>
            <span data-i18n="trimEmptyLines">Trim empty lines at start/end</span>
        </label>
    </div>

    <!-- Output -->
    <div class="output-section" id="outputSection" style="display:none">
        <div class="output-header">
            <h2 data-i18n="mergedOutput">Merged output</h2>
            <span class="output-meta" id="outputMeta"></span>
        </div>
        <div class="truncation-warning" id="truncationWarning">
            ⚠️ <span data-i18n="truncationWarning">Display is limited to 20,000 lines. Download the file for full content.</span>
        </div>
        <div class="output-actions">
            <button class="btn btn-secondary btn-sm" id="copyBtn" data-i18n="copy">📋 Copy</button>
            <button class="btn btn-secondary btn-sm" id="downloadBtn" data-i18n="download">⬇ Download</button>
        </div>
        <div class="output-box" id="outputBox"><div class="line-numbers" id="lineNumbers"></div><div class="output-content" id="outputContent"></div></div>
    </div>
    </div><!-- /main-content -->
    </div><!-- /app-body -->
</div>

<div class="toast" id="toast"></div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
