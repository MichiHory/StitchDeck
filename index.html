    <h1>StitchDeck — AI-Optimized File Merger</h1>
    <p>StitchDeck is a free online tool that merges multiple source code files into a single LLM-optimized output. Perfect for preparing code context for ChatGPT, Claude, Gemini and other AI assistants.</p>
    <h2>Key Features</h2>
    <ul>
        <li>Drag & drop file upload with directory structure preservation</li>
        <li>GitHub repository integration — connect and sync repos directly</li>
        <li>LLM-optimized export format with XML tags and file maps</li>
        <li>Syntax highlighting for 30+ programming languages</li>
        <li>Security scanning to detect secrets and tokens before sharing</li>
        <li>PDF document support with text extraction</li>
        <li>Multiple project management with persistent storage</li>
        <li>Export compression — removes comments and reduces whitespace</li>
        <li>Dark and light theme</li>
        <li>Available in English and Czech</li>
    </ul>
    <p>Please enable JavaScript to use StitchDeck.</p>
